<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --blue: #0a84ff;
        --green: #34c759;
        --purple: #8957e5;
      }

      * { box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 15px;
        margin: 0;
      }

      .app-title {
        font-size: 16px;
        font-weight: 800;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        font-size: 13px;
        font-weight: bold;
        text-align: center;
        color: #fff;
        background: var(--blue);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn:hover { filter: brightness(1.1); }
      .btn-ai { background: var(--purple); }
      .btn-outline { background: var(--bg); border: 1px solid var(--blue); color: var(--blue); }
      
      .btn-action { 
        display: inline-block;
        width: auto;
        padding: 4px 8px;
        font-size: 10px;
        margin-right: 5px;
        margin-top: 8px;
        background: var(--panel);
        border: 1px solid var(--border);
        color: var(--muted);
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-action:hover { border-color: var(--blue); color: var(--blue); }

      #chat-history {
        height: 380px;
        overflow-y: auto;
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 12px;
        background: var(--panel);
        font-size: 13px;
        line-height: 1.5;
      }

      .msg-user { color: var(--blue); margin-bottom: 10px; font-weight: bold; padding-bottom: 5px; border-bottom: 1px solid rgba(139, 148, 158, 0.1); }
      .msg-bot { color: var(--green); margin-bottom: 20px; border-left: 2px solid var(--green); padding-left: 10px; white-space: pre-wrap; font-size: 12px; }

      input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        color: white;
        border-radius: 8px;
        font-size: 13px;
      }

      .status { font-size: 11px; color: var(--muted); margin-top: 10px; min-height: 15px; }

      .sync-card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        margin-top: 10px;
      }

      .prompt-pill {
        display: inline-block;
        padding: 6px 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        font-size: 11px;
        color: var(--muted);
        margin: 4px 4px 0 0;
        cursor: pointer;
        transition: 0.2s;
      }

      .prompt-pill:hover {
        border-color: var(--blue);
        color: var(--blue);
      }

      hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
    </style>
  </head>

  <body>
    <div class="app-title">🏦 Danny Bank Intelligence</div>

    <div id="chat-history"></div>

    <div style="margin-bottom:15px;">
      <div style="font-size:10px; color:var(--muted); margin-bottom:8px; font-weight:bold; text-transform:uppercase; letter-spacing:0.5px;">Analytical Prompts</div>
      <div class="prompt-pill" onclick="usePrompt('Analyze my weekend leaks.')">📊 Weekend</div>
      <div class="prompt-pill" onclick="usePrompt('Identify vampire costs.')">🧛 Vampire</div>
      <div class="prompt-pill" onclick="usePrompt('Optimize my Top 3 categories.')">📉 Optimize</div>
      <div class="prompt-pill" onclick="usePrompt('What is my real savings rate?')">💰 Rate</div>
    </div>

    <input type="text" id="chatInput" placeholder="Ask Gemini..." onkeypress="if(event.key === 'Enter') sendMsg()">
    <button class="btn btn-ai" onclick="sendMsg()">Send</button>

    <div class="sync-card">
      <div style="font-weight:bold; color:var(--blue); font-size:12px;">🔒 Private Local Sync</div>
      <code style="display:block; background:#000; padding:5px; margin-top:5px; border-radius:4px; font-size:10px;">python3 -m src.engine.main</code>
    </div>

    <button class="btn" style="margin-top:15px;" onclick="refreshVisuals()">📈 Refresh Visuals 2.0</button>
    <div class="status" id="statusText">Ready</div>

    <script>
      window.onload = loadHistory;

      function loadHistory() {
        google.script.run.withSuccessHandler(history => {
          const container = document.getElementById('chat-history');
          if (history.length === 0) {
            appendBotMessage("AI: Connected! Enter your key in 'Settings' to start analysis.");
            return;
          }
          history.forEach(m => {
            appendUserMessage(m.user);
            appendBotMessage(m.bot);
          });
        }).getChatHistory();
      }

      function usePrompt(text) {
        document.getElementById('chatInput').value = text;
        sendMsg();
      }

      function appendUserMessage(msg) {
        const div = document.createElement('div');
        div.className = 'msg-user';
        div.textContent = 'You: ' + msg;
        document.getElementById('chat-history').appendChild(div);
      }

      function appendBotMessage(reply) {
        const history = document.getElementById('chat-history');
        const div = document.createElement('div');
        div.className = 'msg-bot';
        div.textContent = 'AI: ' + reply;
        
        // Action Buttons
        const bar = document.createElement('div');
        
        const copyBtn = createActionBtn('📋 Copy', () => {
          const el = document.createElement('textarea');
          el.value = reply; document.body.appendChild(el); el.select();
          document.execCommand('copy'); document.body.removeChild(el);
          setStatus('Copied!');
        });

        const logBtn = createActionBtn('💾 Log to Sheet', () => {
          setStatus('Summarizing & Logging...');
          google.script.run.withSuccessHandler(sum => {
            google.script.run.withSuccessHandler(res => {
              div.textContent += '\n\nSUMMARY:\n' + sum;
              setStatus(res);
            }).logInsightToSheet(reply, sum);
          }).summarizeInsight(reply);
        });

        bar.appendChild(copyBtn);
        bar.appendChild(logBtn);
        div.appendChild(bar);
        history.appendChild(div);
        history.scrollTop = history.scrollHeight;
      }

      function createActionBtn(text, fn) {
        const b = document.createElement('button');
        b.className = 'btn-action';
        b.textContent = text;
        b.onclick = fn;
        return b;
      }

      function setStatus(txt) { document.getElementById('statusText').textContent = txt; }

      function sendMsg() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        appendUserMessage(msg);
        const botDiv = document.createElement('div');
        botDiv.className = 'msg-bot';
        botDiv.textContent = 'AI: Thinking...';
        document.getElementById('chat-history').appendChild(botDiv);
        document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
        input.value = '';
        
        google.script.run.withSuccessHandler(reply => {
          botDiv.remove(); // Remove thinking
          appendBotMessage(reply);
        }).chatWithData(msg);
      }

      function refreshVisuals() {
        setStatus('Updating Dashboard...');
        google.script.run.withSuccessHandler(() => setStatus('Dashboard Ready!')).refreshVisuals();
      }
    </script>
  </body>
</html>
