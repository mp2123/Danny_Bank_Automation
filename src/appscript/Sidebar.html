<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --border: #30363d;
        --text: #c9d1d9;
        --muted: #8b949e;
        --blue: #0a84ff;
        --green: #34c759;
        --purple: #8957e5;
      }

      * { box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 15px;
        margin: 0;
      }

      .app-title {
        font-size: 16px;
        font-weight: 800;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        font-size: 13px;
        font-weight: bold;
        text-align: center;
        color: #fff;
        background: var(--blue);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
      }

      .btn:hover { filter: brightness(1.1); }
      .btn-ai { background: var(--purple); }
      .btn-outline { background: var(--bg); border: 1px solid var(--blue); color: var(--blue); }

      #chat-history {
        height: 350px;
        overflow-y: auto;
        border: 1px solid var(--border);
        padding: 12px;
        margin-bottom: 12px;
        border-radius: 12px;
        background: var(--panel);
        font-size: 13px;
        line-height: 1.5;
      }

      .msg-user { color: var(--blue); margin-bottom: 10px; font-weight: bold; }
      .msg-bot { color: var(--green); margin-bottom: 15px; border-left: 2px solid var(--green); padding-left: 10px; white-space: pre-wrap; }

      input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        background: var(--bg);
        border: 1px solid var(--border);
        color: white;
        border-radius: 8px;
        font-size: 13px;
      }

      .status { font-size: 12px; color: var(--muted); margin-top: 10px; }

      hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }
    </style>
  </head>

  <body>
    <div class="app-title">🏦 Danny Bank Automation</div>

    <div id="chat-history">
      <div class="msg-bot">AI: Hello! Once you add your Gemini API Key to the "Settings" tab, I can analyze your transactions. How can I help?</div>
    </div>

    <input type="text" id="chatInput" placeholder="How much did I spend at Amazon last month?" onkeypress="if(event.key === 'Enter') sendMsg()">
    <button class="btn btn-ai" onclick="sendMsg()">Send</button>

    <hr>

    <button class="btn" onclick="refreshVisuals()">📈 Refresh Dashboard Charts</button>
    <button class="btn btn-outline" onclick="runSync()">🔄 Sync Info (Local)</button>
    <div class="status" id="statusText">Ready</div>

    <script>
      function sendMsg() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        
        const history = document.getElementById('chat-history');
        history.innerHTML += `<div class="msg-user">You: ${msg}</div>`;
        history.scrollTop = history.scrollHeight;
        input.value = '';
        
        google.script.run.withSuccessHandler(reply => {
          history.innerHTML += `<div class="msg-bot">AI: ${reply}</div>`;
          history.scrollTop = history.scrollHeight;
        }).chatWithData(msg);
      }

      function refreshVisuals() {
        document.getElementById('statusText').textContent = 'Updating charts...';
        google.script.run.withSuccessHandler(res => {
          document.getElementById('statusText').textContent = 'Charts updated!';
        }).refreshVisuals();
      }

      function runSync() {
        google.script.run.runManualSync();
      }
    </script>
  </body>
</html>
